<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cake</title>

    <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

        .glados-button {
      position: fixed;
      top: 35px;
      left: 40px;
      width: 220px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }

          .middle-button  /* cake button */
      position: fixed;
      bottom: 50%;
      left: 50%;
      transform: translateY(-50%);
      width: 100px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }
      
  #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      cursor: pointer;
    }

    #loadingScreen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

          .bottom-right-button { /* leave button */
      position: fixed;
      top: 35px;
      right: 40px;
      width: 100px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }
      
  </style>
</head>

  <body>
  <div id="loadingScreen" onclick="closeLoadingScreen()">
    <img src="loading.jpg" alt="Loading Screen">
  </div>

    <img id="gladosButton" src="glados.png" alt="GLaDOS Button" class="glados-button">
    <audio id="gladosAudio" src="glados.mp3"></audio>
    
      <audio id="moosicAudio" src="moosic.mp3" loop></audio>

    <img id="cakeButton" src="click.JPG" alt="Cake Button" class="middle-button" />
    toggle
  <img id="exitButton" src="leave.JPG" alt="Exit Button" class="bottom-right-button" />
   
    

     <script>

     const moosicAudio = document.getElementById("moosicAudio");

        function startmoosicAudio() {
      moosicAudio.volume = 0.35;
      moosicAudio.play().catch(() => {});
    }

    window.addEventListener("load", startmoosicAudio);

    ["click", "keydown"].forEach(eventName => {
      document.addEventListener(eventName, startmoosicAudio, { once: true });
    });

         function closeLoadingScreen() {
      document.getElementById("loadingScreen").style.display = "none";
      startmoosicAudio();
    }

        document.getElementById("cakeButton").addEventListener("click", () => {
      const cakeButton = document.getElementById("bucketButton");

      click = !cake;
      cakeButton.src = cake ? "click.JPG" : "cake.JPG";

    });

       When middle button is pushed it changes from click.JPG to cake.jpg

       When bottom-right-button is clicked = "https://ohlooklizard.github.io/outside/";
  </script>
</body>
</html>
