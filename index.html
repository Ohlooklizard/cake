<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cake</title>

    <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("background1.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

        .glados-button {
      position: fixed;
      top: 35px;
      left: 40px;
      width: 220px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }

          .cake-button { -0------------------add button 
      position: fixed;
      bottom: 20%;
      left: 35px;
      transform: translateY(-50%);
      width: 60px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }
      
  #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      cursor: pointer;
    }

    #loadingScreen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

  <body>
  <div id="loadingScreen" onclick="closeLoadingScreen()">
    <img src="loading.jpg" alt="Loading Screen">
  </div>

    <img id="gladosButton" src="glados.png" alt="GLaDOS Button" class="glados-button">
    
    <audio id="gladosAudio" src="glados.mp3"></audio>

      <audio id="bestdogAudio" src="bestdog.mp3" loop></audio>

     <script>

     const bestdogAudio = document.getElementById("bestdogAudio");

        function startBestdogAudio() {
      bestdogAudio.volume = 0.35;
      bestdogAudio.play().catch(() => {});
    }

    window.addEventListener("load", startBestdogAudio);

    ["click", "keydown"].forEach(eventName => {
      document.addEventListener(eventName, startBestdogAudio, { once: true });
    });

         function closeLoadingScreen() {
      document.getElementById("loadingScreen").style.display = "none";
      startBestdogAudio();
    }
  </script>
</body>
</html>
